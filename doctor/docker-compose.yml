# Genesis Doctor Container
# 安全沙箱：让 Genesis 自调试/自修改代码，不影响本体
#
# 架构：Docker 做进程隔离，宿主机 Python 3.14 + deps 通过卷挂载共享
# 源码只读挂载 → entrypoint 复制到 /workspace（可写副本）
# 数据库快照独立，Discord token 不注入（防止重复登录）

services:
  doctor:
    container_name: genesis-doctor
    image: nanogenesis-sandbox:latest
    entrypoint: ["/bin/bash", "/doctor/entrypoint.sh"]
    working_dir: /workspace
    
    # 资源限制：防止失控进程拖垮宿主机
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          memory: 512M
    
    # 网络：host 模式共享宿主机网络栈（LLM API 访问需要走 v2rayA）
    network_mode: host
    
    # 安全：不给 privileged，靠资源限制 + 只读挂载保护宿主机
    read_only: false
    
    volumes:
      # 宿主机用户空间（只读）：提供 Python 3.14 + 全部依赖
      - /usr:/usr:ro
      - /lib:/lib:ro
      - /lib64:/lib64:ro
      
      # Genesis 源码（只读）→ entrypoint 会复制到 /workspace
      - /home/chendechusn/Genesis/Genesis:/src/genesis:ro
      
      # Python venv（只读）
      - /home/chendechusn/Genesis/Genesis/venv:/opt/venv:ro
      
      # Doctor 脚本
      - ./entrypoint.sh:/doctor/entrypoint.sh:ro
      
      # 持久化工作区（容器重启不丢失修改）
      - doctor-workspace:/workspace
    
    environment:
      - PYTHONPATH=/workspace
      - PATH=/opt/venv/bin:/usr/bin:/bin
      - HOME=/workspace
      # 不注入 DISCORD_TOKEN —— 防止沙箱里的 Genesis 连接 Discord
      # LLM API keys 通过 .env 文件在 entrypoint 中过滤注入
    
    stdin_open: true
    tty: true

volumes:
  doctor-workspace:
    name: genesis-doctor-workspace
